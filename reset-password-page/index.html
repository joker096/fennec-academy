<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fennec Academy — Reset Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #f8fafc; }
    p { color: #94a3b8; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 12px;
      border: 1px solid #475569;
      border-radius: 8px;
      background: #0f172a;
      color: #f8fafc;
      font-size: 16px;
    }
    input:focus { outline: none; border-color: #3b82f6; }
    button {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #ef4444; margin-top: 12px; font-size: 14px; }
    .success { color: #22c55e; margin-top: 12px; font-size: 14px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🦊</div>
    <h1>Reset Password</h1>
    <p>Enter your new password below</p>

    <form id="resetForm">
      <input 
        type="password" 
        id="newPassword" 
        placeholder="New password" 
        required 
        minlength="6"
      />
      <input 
        type="password" 
        id="confirmPassword" 
        placeholder="Confirm new password" 
        required 
      />
      <button type="submit" id="submitBtn">Update Password</button>
    </form>

    <div id="message" class="hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    // CONFIG: Replace with your Supabase credentials
    const SUPABASE_URL = 'https://qhiietjvfuekfaehddox.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoaWlldGp2ZnVla2ZhZWhkZG94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcwMjIwMzksImV4cCI6MjA2MjU5ODAzOX0.2iTjpD5i5AVdyqnPl1Bi5iN5Q7JlfCcl4HUYFznlZ_Q';

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('resetForm');
    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');

    function showError(text) {
      message.textContent = text;
      message.className = 'error';
    }

    function showSuccess(text) {
      message.textContent = text;
      message.className = 'success';
    }

    async function handleReset(e) {
      e.preventDefault();
      
      if (newPassword.value !== confirmPassword.value) {
        showError('Passwords do not match');
        return;
      }

      if (newPassword.value.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';

      try {
        // Parse hash params from Supabase recovery link
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        const refreshToken = params.get('refresh_token');
        const type = params.get('type');

        if (type !== 'recovery' || !accessToken) {
          showError('Invalid or expired reset link. Please request a new one.');
          return;
        }

        // Set the session from the recovery token
        const { error: sessionError } = await supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        });

        if (sessionError) throw sessionError;

        // Update the password
        const { error: updateError } = await supabase.auth.updateUser({
          password: newPassword.value
        });

        if (updateError) throw updateError;

        showSuccess('Password updated successfully! You can now close this page and sign in to the app.');
        form.style.display = 'none';

      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
      }
    }

    form.addEventListener('submit', handleReset);

    // Auto-check if we have valid recovery params
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    if (params.get('type') !== 'recovery') {
      showError('This page only works from a password reset email link.');
      form.style.display = 'none';
    }
  </script>
</body>
</html>
